services:
  db:
    image: postgres:15-alpine
    container_name: siet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: siet_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d siet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: siet_meilisearch
    restart: always
    ports:
      - "7700:7700"
    env_file:
      - .env
    environment:
      - MEILI_ENV=development
    volumes:
      - meili_data:/meili_data
    # No healthcheck here: the getmeili/meilisearch image has neither wget nor curl,
    # so a command-based healthcheck can't be run inside it. The backend's own
    # /api/v1/health/search endpoint reports Meilisearch reachability at runtime instead,
    # and the app degrades gracefully (logs + unhealthy status) if it's unreachable.

  backend:
    build: .
    container_name: siet_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # .env's DATABASE_URL/MEILI_URL default to localhost for running the app directly
      # on the host; inside Compose's network the other services are reachable by their
      # service name instead, so override both here rather than making the .env default
      # wrong for the non-Docker case.
      DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@db:5432/siet_db
      MEILI_URL: http://meilisearch:7700
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      # python:3.11-slim has neither wget nor curl installed; the interpreter running
      # the app itself is the one thing guaranteed present, so use it for the check.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: siet_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
  meili_data:
